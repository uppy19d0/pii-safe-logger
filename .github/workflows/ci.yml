name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Validate package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 1. Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: 2. Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false

      - name: 3. Show package metadata
        run: |
          echo "Package: $(node -p "require('./package.json').name")"
          echo "Version: $(node -p "require('./package.json').version")"
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"

      - name: 4. Check SemVer policy
        run: node scripts/check-semver.js

      - name: 5. Install clean dependencies
        run: npm ci --ignore-scripts

      - name: 6. Run tests
        run: npm test

      - name: 7. Preview npm package
        run: npm pack --dry-run

      - name: 8. Write pipeline summary
        if: always()
        run: |
          {
            echo "## CI Pipeline"
            echo ""
            echo "Job status: ${{ job.status }}"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Checkout source | see step log |"
            echo "| Set up Node.js 24 | see step log |"
            echo "| Check SemVer policy | see step log |"
            echo "| Install with npm ci | see step log |"
            echo "| Run tests | see step log |"
            echo "| Preview npm package | see step log |"
          } >> "$GITHUB_STEP_SUMMARY"
