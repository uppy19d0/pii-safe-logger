name: Deploy to npm

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, test, and publish
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    steps:
      - name: 1. Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: 2. Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: 3. Show package metadata
        run: |
          echo "Package: $(node -p "require('./package.json').name")"
          echo "Version: $(node -p "require('./package.json').version")"
          echo "Registry: https://registry.npmjs.org"

      - name: 4. Check SemVer policy
        run: node scripts/check-semver.js

      - name: 5. Check npm version
        id: npm_version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$PACKAGE_NAME@$PACKAGE_VERSION already exists on npm. Publish will be skipped."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is ready to publish."
          fi

      - name: 6. Install clean dependencies
        if: steps.npm_version.outputs.published == 'false'
        run: npm ci --ignore-scripts

      - name: 7. Run tests
        if: steps.npm_version.outputs.published == 'false'
        run: npm test

      - name: 8. Verify npm token
        if: steps.npm_version.outputs.published == 'false'
        run: npm whoami --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 9. Preview npm package contents
        if: steps.npm_version.outputs.published == 'false'
        run: npm pack --dry-run

      - name: 10. Publish to npm
        if: steps.npm_version.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 11. Verify published package
        if: steps.npm_version.outputs.published == 'false'
        run: |
          PACKAGE_SPEC="${{ steps.npm_version.outputs.package_name }}@${{ steps.npm_version.outputs.package_version }}"

          for attempt in 1 2 3 4 5 6; do
            if npm view "$PACKAGE_SPEC" version --registry=https://registry.npmjs.org; then
              echo "$PACKAGE_SPEC is visible on npm."
              exit 0
            fi

            echo "npm registry has not exposed $PACKAGE_SPEC yet. Retry $attempt/6..."
            sleep 10
          done

          echo "::error::$PACKAGE_SPEC was published but could not be verified after retries."
          exit 1

      - name: 12. Write deploy summary
        if: always()
        run: |
          {
            echo "## npm Deploy Pipeline"
            echo ""
            echo "Package: \`${{ steps.npm_version.outputs.package_name }}\`"
            echo "Version: \`${{ steps.npm_version.outputs.package_version }}\`"
            echo ""
            if [ "${{ steps.npm_version.outputs.published }}" = "true" ]; then
              echo "Result: skipped because this version already exists on npm."
            else
              echo "Result: publish attempted. Check the step status above for the final result."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
